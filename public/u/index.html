<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BlockForge</title>
  <link rel="icon" type="image/png" href="../BlockForge.png">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0a0a12;color:#e0e0e0;font-family:monospace;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
    .card{background:rgba(0,0,0,0.55);border:1px solid rgba(80,80,100,0.35);border-radius:8px;padding:28px 32px;max-width:400px;width:90%;text-align:center}
    .logo{font-size:22px;letter-spacing:6px;color:#fff;margin-bottom:2px}
    .sub{font:11px monospace;color:#7ab;letter-spacing:2px;margin-bottom:18px}
    .name{font:bold 18px monospace;color:#ffdd33;margin-bottom:4px}
    .role{font:11px monospace;color:#7af;margin-bottom:16px}
    input{width:100%;padding:10px 12px;background:rgba(0,0,0,0.55);color:#fff;border:1px solid rgba(100,100,100,0.45);border-radius:4px;font:14px monospace;outline:none;margin-bottom:10px;box-sizing:border-box}
    input:focus{border-color:#5af}
    .btn{width:100%;padding:12px;font-size:13px;border:1px solid #2a5a2a;background:linear-gradient(180deg,#4a7a4a 0%,#3a6a3a 40%,#2a5a2a 60%,#1a4a1a 100%);color:#fff;border-radius:4px;cursor:pointer;font-family:monospace}
    .btn:disabled{opacity:0.5;cursor:not-allowed}
    .hint{font:11px monospace;min-height:16px;margin:8px 0;color:#5a8}
    .footer{font:9px monospace;color:rgba(255,255,255,0.25);margin-top:14px}
    .guest{margin-top:8px}
    .guest a{font:11px monospace;color:#888;text-decoration:underline;cursor:pointer}
    .guest a:hover{color:#bbb}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">BLOCKFORGE</div>
    <div class="sub">PLAYER LOGIN</div>
    <div class="name" id="pname">Loading...</div>
    <div class="role" id="prole"></div>
    <div class="hint" id="hint"></div>
    <input id="pass" type="password" placeholder="Password" maxlength="32" autocomplete="off" />
    <button class="btn" id="login-btn">LOG IN</button>
    <div class="guest"><a href="../">Not you? Go to main login</a></div>
    <div class="footer">By continuing, you agree to the Terms of Service</div>
  </div>
  <script>
    (function() {
      var player = '';
      try { player = localStorage.getItem('bf_player_name') || localStorage.getItem('bf_login_user') || ''; } catch(e) {}
      var savedPass = '';
      try { savedPass = localStorage.getItem('bf_login_pass') || ''; } catch(e) {}
      var role = '';
      try { role = localStorage.getItem('bf_role') || ''; } catch(e) {}

      var nameEl = document.getElementById('pname');
      var roleEl = document.getElementById('prole');
      var passEl = document.getElementById('pass');
      var hintEl = document.getElementById('hint');
      var btnEl = document.getElementById('login-btn');

      if (!player) {
        nameEl.textContent = 'Not logged in';
        roleEl.textContent = '';
        hintEl.style.color = '#f55';
        hintEl.textContent = 'Please log in at the main page first.';
        passEl.style.display = 'none';
        btnEl.style.display = 'none';
        return;
      }

      nameEl.textContent = player;
      roleEl.textContent = role ? 'Role: ' + role : '';
      if (savedPass) { passEl.value = savedPass; }

      // Auto-login if password is saved
      if (savedPass && savedPass.length >= 3) {
        hintEl.textContent = 'Auto-logging in...';
        setTimeout(function() { btnEl.click(); }, 400);
      }

      var sent = false;
      btnEl.addEventListener('click', function() {
        if (sent) return;
        var pw = passEl.value || '';
        if (pw.length < 3) { hintEl.style.color = '#f85'; hintEl.textContent = 'Password must be at least 3 characters.'; passEl.focus(); return; }
        sent = true;
        hintEl.style.color = '#5a8'; hintEl.textContent = 'Logging in...';
        btnEl.disabled = true;

        // Save password for background auth
        try { localStorage.setItem('bf_login_pass', pw); } catch(e) {}

        // Set auth flag so the main game knows we came from /u/
        try { sessionStorage.setItem('bf_from_u', '1'); } catch(e) {}

        // Redirect to main game
        var params = '?user=' + encodeURIComponent(player);
        if (role) params += '&role=' + encodeURIComponent(role);
        window.location.href = '../' + params;
      });

      passEl.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') btnEl.click();
      });

      if (!savedPass) passEl.focus();
    })();
  </script>
</body>
</html>
