<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BlockForge</title>
  <link rel="icon" type="image/png" href="../BlockForge.png">
  <script>
    var user = '';
    var role = '';
    try { user = localStorage.getItem('bf_player_name') || localStorage.getItem('bf_login_user') || ''; } catch(e) {}
    try { role = localStorage.getItem('bf_role') || ''; } catch(e) {}
    var params = '';
    if (user) {
      params = '?user=' + encodeURIComponent(user);
      if (role) params += '&role=' + encodeURIComponent(role);
    }
    window.location.href = '../' + params;
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
