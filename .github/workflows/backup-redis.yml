name: Weekly Redis Backup

# Dumps the Upstash Redis data (accounts, friends, rooms) into the repo's
# backups/ folder once a week, as a disaster-recovery snapshot in case the
# Redis database is ever lost. Requires two repo secrets:
#   UPSTASH_REDIS_REST_URL, UPSTASH_REDIS_REST_TOKEN

on:
  schedule:
    - cron: '0 3 * * 0'   # Sundays 03:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Dump Redis keys
        env:
          URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: |
          if [ -z "$URL" ] || [ -z "$TOKEN" ]; then
            echo "Upstash secrets not set — skipping."; exit 0
          fi
          mkdir -p backups
          for key in accounts friends server-data; do
            resp=$(curl -s -X POST "$URL" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d "[\"GET\",\"$key\"]")
            echo "$resp" | jq -r '.result // ""' > "backups/redis-$key.json"
            echo "Backed up $key ($(wc -c < backups/redis-$key.json) bytes)"
          done
      - name: Commit backup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backups/
          if git diff --staged --quiet; then
            echo "No changes to back up."
          else
            git commit -m "Weekly Redis backup [skip ci]"
            git push
          fi
