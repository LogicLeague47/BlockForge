name: Keep Render Server Awake

# Pings the Render backend so the free instance never idles into sleep mode,
# which is what causes the ~30-60s cold start. Runs every 10 minutes.
# Note: GitHub's scheduled runs can be delayed a few minutes under load, and
# scheduled workflows auto-disable after 60 days with no repo activity — just
# push any commit (or click "Run workflow") to re-enable.

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          curl -fsS --max-time 60 https://blockforge-server.onrender.com/health \
            && echo "Server is awake" \
            || echo "Ping failed (server may be cold-starting)"
